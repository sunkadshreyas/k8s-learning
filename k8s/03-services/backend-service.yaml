# NodePort Service for the movies-api backend.
# NodePort exposes the service on a port on the node — reachable from outside the cluster.
# minikube ip + nodePort = http://<minikube-ip>:30080

apiVersion: v1
kind: Service
metadata:
  name: movies-api
spec:
  type: NodePort
  selector:
    app: movies-api  # routes to backend pods
  ports:
    - port: 8080       # port the Service listens on (cluster-internal)
      targetPort: 8080 # port the container listens on
      nodePort: 30080  # port exposed on the node (must be 30000–32767)

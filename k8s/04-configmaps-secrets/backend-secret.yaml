# Secret holding sensitive database credentials for the backend.
# Values must be base64-encoded. Base64 is not encryption — security comes from RBAC
# controlling who can read Secrets, and from NOT committing this file to git.

apiVersion: v1
kind: Secret
metadata:
  name: movies-api-secret
type: Opaque
data:
  DB_PASSWORD: cG9zdGdyZXM=   # "postgres" base64-encoded
